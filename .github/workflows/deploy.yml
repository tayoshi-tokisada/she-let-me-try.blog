# ================================
# GitHub Actions：Xserver に子テーマを自動デプロイ
# ================================

name: Deploy Theme to Xserver  # ← このワークフローの名前（自由に決めてOK）

on:
  push:
    branches:
      - main  # main ブランチに push されたときだけ実行する
  workflow_dispatch:  # 手動実行を許可

jobs:
  deploy:
    runs-on: ubuntu-latest  # GitHub Actions が使う仮想マシンの OS（Xserver とは無関係）

    steps:
      # ----------------------------------------
      # 1. GitHub リポジトリを Actions 環境に取得
      #    ※ 今回の構成では必須ではないが、慣習的に入れておくと後で便利
      # ----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v3  # GitHub 公式の「リポジトリを取得するアクション」

      # ----------------------------------------
      # 2. Xserver に SSH 接続して、サーバー側で git pull を実行
      #    ※ 実際のデプロイ処理はここ
      # ----------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3  # SSH 接続を行うアクション（世界的に定番）
        with:
          host: ${{ secrets.SSH_HOST }}        # Xserver のホスト名（例：mtskyblue.xsrv.jp）
          username: ${{ secrets.SSH_USERNAME }} # サーバーID
          key: ${{ secrets.SSH_PRIVATE_KEY }}   # GitHub 用秘密鍵
          port: ${{ secrets.SSH_PORT }}         # Xserver の SSH ポート（10022）
          script: |
            script: |
            cd she-let-me-try.blog/
            echo "--- 現在の場所 (pwd) ---"
            pwd
            echo "--- ホームディレクトリ (~ の中身) ---"
            cd ~ && pwd
            echo "--- ディレクトリ一覧 (ls -F) ---"
            ls -F

